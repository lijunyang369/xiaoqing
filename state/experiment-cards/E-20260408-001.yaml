id: E-20260408-001
name: 决策包批处理实验
hypothesis: 将决策事项批量处理（每日两次）可以减少中断频率并降低平均等待时间
linkedConstraintId: C-20260408-001

change:
  - 所有非紧急决策汇总到两个时间窗（11:00-12:00, 16:00-17:00）
  - 小青在决策窗前一小时准备DecisionPacket
  - 紧急决策（截止时间<4小时）允许即时升级
  - 决策结果在决策窗结束后一小时内传达

successMetrics:
  - 中断频率降低40%（从8次/天降至≤5次/天）
  - 平均等待时间降低30%（从5.9小时降至≤4.1小时）
  - 决策质量不下降（通过返工率评估）
  - 团队满意度不下降（通过主观反馈评估）

guardrails:
  - 如果紧急决策比例超过30%，暂停实验
  - 如果任何任务的等待时间超过12小时，允许例外处理
  - 如果俊阳反馈不适应，立即停止

startAt: 2026-04-09T09:00:00+08:00
reviewAt: 2026-04-12T18:00:00+08:00
status: Planned
result: null
owner: xiaoqing

notes:
  - 这是一个示例ExperimentCard，展示了如何设计提升制约的小实验
  - 实验针对当前主制约（决策吞吐）
