<!DOCTYPE html>
<html>
<head>
    <title>Avatar Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .avatar-container { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .avatar { width: 48px; height: 48px; }
        .test-result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Avatar Loading Test</h1>
    
    <div class="avatar-container">
        <h3>Test 1: Workspace avatar (avatars/phoenix.svg)</h3>
        <img id="avatar1" class="avatar" src="../avatars/phoenix.svg" alt="Workspace Avatar">
        <div id="result1" class="test-result">Loading...</div>
    </div>
    
    <div class="avatar-container">
        <h3>Test 2: OpenClaw default avatar (assets/avatar-placeholder.svg)</h3>
        <img id="avatar2" class="avatar" src="../../.npm-global/lib/node_modules/openclaw/assets/avatar-placeholder.svg" alt="Default Avatar">
        <div id="result2" class="test-result">Loading...</div>
    </div>
    
    <div class="avatar-container">
        <h3>Test 3: Absolute path to workspace avatar</h3>
        <img id="avatar3" class="avatar" src="/home/lijunyang/.openclaw/workspace/avatars/phoenix.svg" alt="Absolute Path Avatar">
        <div id="result3" class="test-result">Loading...</div>
    </div>
    
    <div class="avatar-container">
        <h3>Test 4: Data URL (inline SVG)</h3>
        <img id="avatar4" class="avatar" alt="Inline SVG">
        <div id="result4" class="test-result">Will be set via JavaScript</div>
    </div>
    
    <script>
        // Test image loading
        function testImage(imgId, resultId) {
            const img = document.getElementById(imgId);
            const result = document.getElementById(resultId);
            
            img.onload = function() {
                result.innerHTML = '<span class="success">✓ Loaded successfully</span>';
                result.innerHTML += `<br>Dimensions: ${img.naturalWidth}×${img.naturalHeight}`;
            };
            
            img.onerror = function() {
                result.innerHTML = '<span class="error">✗ Failed to load</span>';
                result.innerHTML += `<br>Error loading: ${img.src}`;
            };
        }
        
        // Test inline SVG
        const svgData = `data:image/svg+xml;base64,${btoa(`<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 36 36"><path fill="#FFAC33" d="M8.916 12.88c-.111 1.652 1.768 3.126-.712 2.959-2.48-.167-7.836-2.533-7.768-3.53s3.708-2.757 6.188-2.59c2.48.166 2.404 1.508 2.292 3.161zm20.122 16.049c-.202-.032-.392.015-.564.095-2.325.232-3.225-1.885-3.225-1.885-.439-.336-.981-2.009-1.589-1.215l.187 1.402c.187 1.402 2.57 3.224 2.57 3.224l-1.215 1.589c-.336.439-.252 1.066.187 1.402.439.336 1.066.252 1.402-.187l.673-.88-.039.249c-.087.546.285 1.058.831 1.145.546.087 1.058-.285 1.145-.831l.47-2.963c.085-.546-.287-1.058-.833-1.145zm-6.278.623c-.196-.058-.39-.037-.572.018-2.335-.082-2.944-2.3-2.944-2.3-.39-.392-.703-2.123-1.412-1.417l-.003 1.414c-.003 1.414 2.115 3.539 2.115 3.539l-1.417 1.412c-.392.39-.393 1.023-.003 1.414.39.392 1.023.393 1.414.003l.785-.782-.073.242c-.159.529.141 1.086.67 1.246.529.159 1.087-.141 1.246-.67l.862-2.873c.162-.53-.138-1.087-.668-1.246z"/><path fill="#DD2E44" d="M35.009 6.729c-.383-.17-.758-.057-1.05.244-.054.056-4.225 6.306-14.532 4.944-.34-.045 3.139 11.968 3.199 11.962.124-.014 3.07-.368 6.14-2.553 2.818-2.005 6.284-5.991 6.797-13.598.028-.418-.171-.828-.554-.999z"/></svg>`)}`;
        document.getElementById('avatar4').src = svgData;
        
        // Run tests
        setTimeout(() => {
            testImage('avatar1', 'result1');
            testImage('avatar2', 'result2');
            testImage('avatar3', 'result3');
            
            const avatar4 = document.getElementById('avatar4');
            const result4 = document.getElementById('result4');
            avatar4.onload = function() {
                result4.innerHTML = '<span class="success">✓ Inline SVG loaded successfully</span>';
            };
            avatar4.onerror = function() {
                result4.innerHTML = '<span class="error">✗ Inline SVG failed to load</span>';
            };
        }, 100);
    </script>
</body>
</html>
